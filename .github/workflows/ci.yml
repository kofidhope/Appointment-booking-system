
name: Backend CI/CD

on:
  push:
    branches: ["main"]

  pull_request:
    branches: ["main"]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build project
        working-directory: backend
        run: mvn clean package

  docker:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Project
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/appointment-booking-backend:latest ./backend

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/appointment-booking-backend:latest