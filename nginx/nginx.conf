events {
    worker_connections 1024;
}

http {
    upstream backend {
        server backend:8088;
    }

    server {
        listen 80;
        server_name EaseBook.mooo.com;

        # Required for certbot domain verification
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name EaseBook.mooo.com;

        ssl_certificate /etc/letsencrypt/live/easebook.mooo.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/easebook.mooo.com/privkey.pem;

        # Increase header buffer size
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        large_client_header_buffers 4 16k;

        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Accept-Encoding "";
        }
    }
}