events {
    worker_connections 1024;
}

http {
    upstream backend {
        server backend:8088;
    }

    # HTTP - Redirect to HTTPS for main domain
    server {
        listen 80;
        server_name easebook.mooo.com;

        # Required for certbot domain verification
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS - Main backend
    server {
        listen 443 ssl;
        server_name easebook.mooo.com;

        ssl_certificate /etc/letsencrypt/live/easebook.mooo.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/easebook.mooo.com/privkey.pem;

        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Accept-Encoding "";
        }
    }

    # HTTP - Prometheus
    server {
        listen 80;
        server_name prometheus.easebook.mooo.com;

        location / {
            proxy_pass http://prometheus:9090;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # HTTP - Grafana
    server {
        listen 80;
        server_name grafana.easebook.mooo.com;

        location / {
            proxy_pass http://grafana:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}