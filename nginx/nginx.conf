events {
    worker_connections 1024;
}

http {
    upstream backend {
        server backend:8088;
    }

    server {
        listen 80;
        server_name EaseBook.mooo.com;

        # Required for certbot domain verification
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Temporarily serve backend directly on HTTP
        # TODO: uncomment the redirect below and remove this block once SSL is ready
        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # UNCOMMENT this and remove the block above once certificate is generated
        # location / {
        #     return 301 https://$host$request_uri;
        # }
    }

